    <style>

        }
        h2 {
            border-left: 5px solid #555;
            padding-left: 10px;
        }

            width: 100%;

<header>
    <h1>報導文學：不肖兒英伸</h1>
</header>

<div class="container">

    <h2>人物介紹</h2>
    <p>
        湯英伸曾就讀嘉義師專，後因故休學。1986年初，為負擔家計，
        從阿里山鄉特富野前往臺北市謀職。
    </p>

    <h2>事件還原</h2>

    <h3>圖1：洗衣店</h3>
    <img src="圖檔.png" alt="洗衣店照片">

    <p>
        遠從嘉義到台北打拼的湯英伸，原先在西餐廳工作，
        後被介紹到洗衣店。老闆將薪資從500元降到200元，
        並要求每天工作17小時，甚至扣留他的身分證。
    </p>

    <p>
        第八天他鼓起勇氣辭職並要求歸還證件，但遭拒絕。
        第九天凌晨被強迫工作，精神瀕臨崩潰，最終爆發衝突，
        釀成悲劇。
    </p>

    <h3>圖2：被捕畫面</h3>
    <img src="圖檔.png" alt="被捕照片">

    <h2>法院判決</h2>
    <p>
        湯英伸最終被判處死刑並執行。此事件引發社會廣泛關注，
        許多人開始反思原住民在社會中的處境與不平等問題。
    </p>

</div>
